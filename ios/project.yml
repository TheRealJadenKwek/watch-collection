name: WatchCollection
options:
  bundleIdPrefix: com.jadenkwek
  deploymentTarget:
    iOS: "17.0"
targets:
  WatchCollection:
    type: application
    platform: iOS
    sources: [Sources]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jadenkwek.watchcollection
        DEVELOPMENT_TEAM: RLC58VS9R6
        MARKETING_VERSION: "1.2"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
    info:
      path: Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleDisplayName: Watch Collection
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSPhotoLibraryUsageDescription: Add photos to your watch collection.
        NSCameraUsageDescription: Take photos for your watch collection.
